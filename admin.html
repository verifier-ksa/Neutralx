<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Direct GitHub Upload</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        #linkArea { margin-top: 15px; padding: 10px; background: #e9f5ff; border: 1px dashed #007bff; border-radius: 6px; word-break: break-all; text-align: left; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="passInput" placeholder="Enter Password">
    <button style="background:#007bff;" onclick="login()">Login</button>
</div>

<div class="box hidden" id="uploadBox">
    <h2>Direct GitHub Upload</h2>
    <input type="text" id="cardId" placeholder="Enter Card ID (e.g., 55659)">
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn" onclick="uploadToGitHub()">Upload & Link Automatically</button>
    <div id="status" style="margin-top: 10px; font-weight: bold; color: #333;"></div>
    <div id="linkArea" class="hidden"></div>
</div>

<script>
    // আপনার ফায়ারবেস কনফিগ
    const firebaseConfig = {
        apiKey: "AIzaSyB8rIFihJP6fZLZsOFovqvX4bHKijqd7PE",
        authDomain: "bureauveritas-cirtificate.firebaseapp.com",
        projectId: "bureauveritas-cirtificate"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // আপনার নতুন গিটহাব রিপোজিটরির সঠিক তথ্য অটো সেট করা আছে
    const GITHUB_USER = "verifier-ksa"; 
    const GITHUB_REPO = "Neutralx";
    const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN_HERE"; // <--- এখানে আপনার গিটহাব টোকেনটি বসান

    function login() {
        const pass = document.getElementById('passInput').value;
        if(pass === "12345") { 
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('uploadBox').classList.remove('hidden');
        } else {
            alert("Wrong Password!");
        }
    }

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }

    async function uploadToGitHub() {
        const id = document.getElementById('cardId').value.trim();
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const linkArea = document.getElementById('linkArea');

        if(!id || !file) { alert("Please enter ID and select a file!"); return; }

        btn.disabled = true;
        status.innerText = "Uploading directly to GitHub...";

        try {
            const base64Content = await readFileAsBase64(file);
            const fileName = id + "_" + file.name;
            const gitHubUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fileName}`;

            // ১. গিটহাব এপিআই দিয়ে ফাইল আপলোড
            const response = await fetch(gitHubUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Upload certificate card ${id}`,
                    content: base64Content
                })
            });

            if (!response.ok) throw new Error("GitHub Upload Failed");

            // ২. গিটহাব লাইভ ইমেজ ইউআরএল জেনারেট
            const finalImageUrl = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${fileName}`;

            // ৩. গুগলের ফ্রি ডাটাবেজে আইডি ও লিংক ম্যাপিং সেভ
            await db.collection('cards').doc(id).set({ imageUrl: finalImageUrl });

            status.innerText = "Upload & Connection Success!";
            const liveLink = window.location.origin + window.location.pathname.replace('admin.html', '') + "?id=" + id;
            linkArea.classList.remove('hidden');
            linkArea.innerHTML = `<strong>Your Live Link:</strong><br><a href="${liveLink}" target="_blank">${liveLink}</a>`;
        } catch (error) {
            console.error(error);
            status.innerText = "Failed! Check your GitHub Token or Repository Permissions.";
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
