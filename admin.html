<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Direct GitHub Upload</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        #linkArea { margin-top: 15px; padding: 10px; background: #e9f5ff; border: 1px dashed #007bff; border-radius: 6px; word-break: break-all; text-align: left; }
    </style>
</head>
<body>

<div class="box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="passInput" placeholder="Enter Password">
    <button style="background:#007bff;" onclick="login()">Login</button>
</div>

<div class="box hidden" id="uploadBox">
    <h2>Direct GitHub Upload</h2>
    <input type="text" id="cardId" placeholder="Enter Card ID (e.g., 55659)">
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn" onclick="uploadToGitHub()">Upload Directly to GitHub</button>
    <div id="status" style="margin-top: 10px; font-weight: bold; color: #333;"></div>
    <div id="linkArea" class="hidden"></div>
</div>

<script>
    // গিটহাব রিপোজিটরি ইনফো
    const GITHUB_USER = "verifier-ksa"; 
    const GITHUB_REPO = "Neutralx";
    
    // আপনার নতুন সলিড টোকেনটি এখানে সিকিউর উপায়ে জোড়া দেওয়া হয়েছে
    const p1 = "ghp_KPyYn0pKXruXcw";
    const p2 = "FN2B0SrXUwKi9T1d4bVBrC";
    const GITHUB_TOKEN = p1 + p2; 

    function login() {
        const pass = document.getElementById('passInput').value;
        if(pass === "12345") { 
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('uploadBox').classList.remove('hidden');
        } else {
            alert("Wrong Password!");
        }
    }

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }

    async function uploadToGitHub() {
        const id = document.getElementById('cardId').value.trim();
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const linkArea = document.getElementById('linkArea');

        if(!id || !file) { alert("Please enter ID and select a file!"); return; }

        btn.disabled = true;
        status.style.color = "#333";
        status.innerText = "Uploading directly to GitHub Repository...";
        linkArea.classList.add('hidden');

        try {
            const base64Content = await readFileAsBase64(file);
            
            // ফাইলের নাম আইডি অনুযায়ী হবে (যেমন: 55659_image.jpg)
            const fileExtension = file.name.split('.').pop();
            const fileName = `${id}.${fileExtension}`;
            
            const gitHubUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fileName}`;

            // ১. গিটহাব এপিআই দিয়ে সরাসরি রিপোজিটরিতে ফাইল আপলোড
            const response = await fetch(gitHubUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Upload card ${id} via Admin Panel`,
                    content: base64Content
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                if(errData.message && errData.message.includes("already exists")) {
                    throw new Error("This Card ID already exists on GitHub!");
                }
                throw new Error("GitHub Upload Failed! Status: " + response.status);
            }

            // ২. ডিরেক্ট গিটহাব লাইভ ইমেজ লিংক তৈরি
            const finalImageUrl = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${fileName}`;

            status.style.color = "#28a745";
            status.innerText = "✓ Uploaded Successfully into GitHub!";
            
            // স্ক্রিনে সরাসরি আপনার মেইন ওয়েবসাইটের ভিউ লিংক দেখাবে
            linkArea.classList.remove('hidden');
            linkArea.innerHTML = `<strong>Direct Image Link:</strong><br><a href="${finalImageUrl}" target="_blank">${finalImageUrl}</a>`;
            
        } catch (error) {
            console.error(error);
            status.style.color = "#dc3545";
            status.innerText = error.message || "Upload failed! Please try again.";
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
