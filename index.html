<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verification Portal</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; overflow: hidden; overscroll-behavior: none; touch-action: pinch-zoom; }
        .container { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; text-align: center;}
        img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); -webkit-user-drag: none; user-select: none; display: none; }
        .msg { font-family: Arial, sans-serif; color: #666; font-size: 16px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container">
        <div id="loader" class="msg">Checking Verification...</div>
        <img id="cardImage" alt="Card Verification">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB8rIFihJP6fZLZsOFovqvX4bHKijqd7PE",
        authDomain: "bureauveritas-cirtificate.firebaseapp.com",
        projectId: "bureauveritas-cirtificate"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // URL থেকে আইডি রিড করা (?id=55659)
    const urlParams = new URLSearchParams(window.location.search);
    const cardId = urlParams.get('id');

    if (cardId) {
        db.collection('cards').doc(cardId).get().then((doc) => {
            if (doc.exists) {
                document.getElementById('loader').style.display = 'none';
                const imgTag = document.getElementById('cardImage');
                imgTag.src = doc.data().imageUrl;
                imgTag.style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "Invalid ID! Certificate Not Found.";
            }
        }).catch((error) => {
            document.getElementById('loader').innerText = "Error loading verification data.";
        });
    } else {
        document.getElementById('loader').innerText = "No ID Provided. Append ?id=YOUR_ID to URL";
    }
</script>
</body>
</html>
